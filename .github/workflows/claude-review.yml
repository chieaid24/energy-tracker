name: Claude Code Review

on:
  workflow_dispatch:

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude'))
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request thoroughly for:
            1. Code quality and architecture adherence to CLAUDE.md rules
            2. Security vulnerabilities and best practices
            3. Logic errors and edge cases
            4. Performance issues
            5. Test coverage and correctness

            Reference the project's CLAUDE.md for conventions and patterns.
            Flag any violations of the documented project rules.
