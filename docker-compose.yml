services:
  mysql:
    image: mysql:8.3.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: energy_tracker
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s
    ports:
      - "3307:3306"
    volumes:
      - ./docker/mysql/source.cnf:/etc/mysql/conf.d/source.cnf:ro
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db-data:/var/lib/mysql

  mysql-replica:
    image: mysql:8.3.0
    container_name: mysql-replica
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - ./docker/mysql/replica.cnf:/etc/mysql/conf.d/replica.cnf:ro
      - ./docker/mysql/replica-init.sql:/docker-entrypoint-initdb.d/replica-init.sql:ro
      - db-data-replica:/var/lib/mysql
    ports:
      - "3308:3306"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  kafka:
    container_name: kafka
    image: apache/kafka:latest
    ports:
      - "9092:9092" # Internal listener
      - "9094:9094" # External listener
    
    environment:
      # ID for this Kafka node
      KAFKA_NODE_ID: 1
      # Kafka cluster identifier
      KAFKA_CLUSTER_ID: 'energy-tracker-cluster-1'
      # Node roles (instance will be a broker and controller)
      KAFKA_PROCESS_ROLES: 'broker,controller'

      # List of controller nodes that form the Raft quorum
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      # Listener name used by controllers for internal Raft communication
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      # Define all listener endpoints for this Kafka node
      KAFKA_LISTENERS: >
        PLAINTEXT://0.0.0.0:9092,
        EXTERNAL://0.0.0.0:9094,
        CONTROLLER://0.0.0.0:9093

      # What each listener advertises to connecting clients
      # Internal (Docker containers): kafka:9092
      # External (host machine): localhost:9094
      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://kafka:9092,
        EXTERNAL://localhost:9094

      # Maps listener names to their security protocols
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        CONTROLLER:PLAINTEXT,
        PLAINTEXT:PLAINTEXT,
        EXTERNAL:PLAINTEXT

      # Which listener brokers should use for internal communication
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'


      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Speed up consumer group startup
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Auto create topic if they don't already exist
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: 1
        
    volumes:
      - ./docker/kafka_data:/var/lib/kafka/data

  kafka-ui:
    container_name: kafka-ui
    image: ghcr.io/kafbat/kafka-ui:latest
    ports:
      - "8070:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092  # Use internal Docker network name
      DYNAMIC_CONFIG_ENABLED: 'true'
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8072:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=chieaid24
      - DOCKER_INFLUXDB_INIT_BUCKET=usage-bucket
      - DOCKER_INFLUXDB_INIT_RETENTION=1w
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-token
    volumes:
      - ./influxdb_data:/var/lib/influxdb2
      
      
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    pull_policy: if_not_present
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: []
    command:
      - /bin/sh
      - -c
      - |
          ollama serve &
          i=0;
          until ollama list >/dev/null 2>&1; do
            i=$$((i+1));
            if [ "$$i" -ge 60 ]; then
              echo "Ollama did not become ready in 60 seconds" >&2;
              exit 1;
            fi;
            sleep 1;
          done;
          ollama pull gemma3:4b;
          echo "Warming up model gemma3:4b...";
          ollama run gemma3:4b "hello" > /dev/null 2>&1 || true;
          echo "Warmup complete.";
          wait

  user-service:
    build:
      context: ./services/user-service
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: user-service
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/energy_tracker
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_REPLICA_URL: jdbc:mysql://mysql-replica:3306/energy_tracker
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: "http://tempo:4318/v1/traces"
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: "false"
      LOGGING_STRUCTURED_FORMAT_CONSOLE: "ecs"
      JWT_SECRET: "iot-energy-tracker-jwt-secret-key-change-in-production-min-256-bits"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
    depends_on:
      mysql:
        condition: service_healthy

  device-service:
    build:
      context: ./services/device-service
    ports:
      - "8081:8081"
    environment:
      SPRING_APPLICATION_NAME: device-service
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/energy_tracker
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_REPLICA_URL: jdbc:mysql://mysql-replica:3306/energy_tracker
      USER_SERVICE_URL: http://user-service:8080/api/v1/user
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: "http://tempo:4318/v1/traces"
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: "false"
      LOGGING_STRUCTURED_FORMAT_CONSOLE: "ecs"
    depends_on:
      mysql:
        condition: service_healthy

  ingestion-service:
    build:
      context: ./services/ingestion-service
    ports:
      - "8082:8082"
    environment:
      SPRING_APPLICATION_NAME: ingestion-service
      SERVER_PORT: 8082
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER: org.springframework.kafka.support.serializer.JsonSerializer
      SPRING_KAFKA_PRODUCER_KEY_SERIALIZER: org.apache.kafka.common.serialization.StringSerializer
      INGESTION_ENDPOINT: http://ingestion-service:8082/api/v1/ingestion
      DEVICE_SERVICE_URL: http://device-service:8081/api/v1/device
      SIMULATION_PARALLEL_THREADS: 10
      SIMULATION_REQUESTS_PER_INTERVAL: 100
      SIMULATION_INTERVAL_MS: 5000
      SPRING_KAFKA_TEMPLATE_OBSERVATION_ENABLED: "true"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: "http://tempo:4318/v1/traces"
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: "false"
      LOGGING_STRUCTURED_FORMAT_CONSOLE: "ecs"
    depends_on:
      - kafka

  usage-service:
    build:
      context: ./services/usage-service
    environment:
      SPRING_APPLICATION_NAME: usage-service
      SERVER_PORT: 8083
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER: org.springframework.kafka.support.serializer.JsonSerializer
      SPRING_KAFKA_PRODUCER_KEY_SERIALIZER: org.apache.kafka.common.serialization.StringSerializer
      SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER: org.springframework.kafka.support.serializer.JsonDeserializer
      SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES: "*"
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: my-token
      INFLUX_ORG: chieaid24
      INFLUX_BUCKET: usage-bucket
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      DEVICE_SERVICE_URL: http://device-service:8081/api/v1/device
      USER_SERVICE_URL: http://user-service:8080/api/v1/user
      SPRING_KAFKA_TEMPLATE_OBSERVATION_ENABLED: "true"
      SPRING_KAFKA_LISTENER_OBSERVATION_ENABLED: "true"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: "http://tempo:4318/v1/traces"
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: "false"
      LOGGING_STRUCTURED_FORMAT_CONSOLE: "ecs"
    depends_on:
      - kafka
      - influxdb
      - redis
      - device-service
      - user-service

  alert-service:
    build:
      context: ./services/alert-service
    ports:
      - "8084:8084"
    environment:
      SPRING_APPLICATION_NAME: alert-service
      SERVER_PORT: 8084
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER: org.springframework.kafka.support.serializer.JsonDeserializer
      SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES: "*"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/energy_tracker
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_REPLICA_URL: jdbc:mysql://mysql-replica:3306/energy_tracker
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      SPRING_KAFKA_LISTENER_OBSERVATION_ENABLED: "true"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: "http://tempo:4318/v1/traces"
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: "false"
      LOGGING_STRUCTURED_FORMAT_CONSOLE: "ecs"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      mailpit:
        condition: service_started

  insight-service:
    build:
      context: ./services/insight-service
    ports:
      - "8085:8085"
    environment:
      SPRING_APPLICATION_NAME: insight-service
      SERVER_PORT: 8085
      USAGE_SERVICE_URL: http://usage-service:8083/api/v1/usage
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL: gemma3:4b
      SPRING_AI_OLLAMA_CHAT_OPTIONS_TEMPERATURE: "0.4"
      SPRING_AI_OLLAMA_CHAT_OPTIONS_TOP-P: "0.5"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: "http://tempo:4318/v1/traces"
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: "false"
      LOGGING_STRUCTURED_FORMAT_CONSOLE: "ecs"
    depends_on:
      - usage-service
      - ollama

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      AUTH_TRUST_HOST: "true"
      AUTH_URL: http://localhost
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-iot-energy-tracker-nextauth-secret-change-in-prod}"
      BACKEND_URL: http://user-service:8080
      NEXT_PUBLIC_API_URL: ""
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
    depends_on:
      - user-service

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-service
      - device-service
      - ingestion-service
      - usage-service
      - alert-service
      - insight-service
      - frontend

volumes:
  db-data:
  db-data-replica:
  kafka-data:
  ollama-data:
  frontend-node-modules:

networks:
  default:
    name: iot-network