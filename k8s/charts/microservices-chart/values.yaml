ingress:
  enabled: true
  className: nginx
  # When host is empty (default) the Ingress matches all hosts — current Minikube behavior.
  host: ""
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
  tls:
    enabled: false
    secretName: ""

global:
  namespace: default

  # MySQL connection details test
  mysql:
    host: infra-mysql  # ie the name of the release must be "infra"
    port: 3307
    replicaHost: infra-mysql-replica  # internal ClusterIP service for read replica
    replicaPort: 3306
    database: energy_tracker
    username: root
    password: password

  # When set, overrides SPRING_DATASOURCE_URL in the global ConfigMap.
  # Used by the EKS overlay to point at RDS instead of in-cluster MySQL.
  # Leave empty to keep the in-cluster URL derived from global.mysql.* above.
  datasource:
    urlOverride: ""
    replicaUrlOverride: ""

  # When set, overrides SPRING_KAFKA_BOOTSTRAP_SERVERS.
  # Used by the EKS overlay to point at MSK Serverless.
  kafka:
    bootstrapOverride: ""
    # When true, the global ConfigMap renders SASL_SSL + AWS_MSK_IAM properties
    # required to authenticate against MSK Serverless. Default false keeps the
    # in-cluster Kafka (PLAINTEXT) behavior unchanged for Minikube/Compose.
    iamAuth: false

  # Secret delivery mode.
  # - "inline":   render Secret resources from values (current Minikube/Compose behavior)
  # - "external": render ExternalSecret resources that pull from AWS Secrets Manager
  secrets:
    mode: inline
    external:
      secretStoreRef: aws-secrets-manager
      # Path prefix in Secrets Manager. ExternalSecrets resolve:
      #   <path>/global   -> microservices-global-secret
      #   <path>/frontend -> microservices-frontend-secret
      path: iot/dev
      refreshInterval: 1h

  influx:
    token: my-token

  jwt:
    secret: "my-super-secret-jwt-key-that-is-at-least-32-bytes-long"

# User Service Configuration
userService:
  enabled: true
  image:
    repository: public.ecr.aws/v6r1m8q2/energy-tracker/user-service
    tag: latest
    pullPolicy: Always
  port: 8080
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

