{{- if eq (.Values.global.secrets.mode | default "inline") "external" }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-global-secret
  namespace: {{ .Values.global.namespace }}
spec:
  refreshInterval: {{ .Values.global.secrets.external.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.global.secrets.external.secretStoreRef | default "aws-secrets-manager" }}
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-global-secret
    creationPolicy: Owner
  # Pulls a JSON-encoded Secrets Manager value at <path>/global and explodes
  # its keys into the rendered Secret. Required keys:
  #   SPRING_DATASOURCE_PASSWORD, INFLUX_TOKEN, JWT_SECRET
  dataFrom:
  - extract:
      key: {{ printf "%s/global" .Values.global.secrets.external.path | quote }}
{{- end }}
