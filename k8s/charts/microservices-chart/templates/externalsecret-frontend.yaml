{{- if and .Values.frontend.enabled (eq (.Values.global.secrets.mode | default "inline") "external") }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-frontend-secret
  namespace: {{ .Values.global.namespace }}
spec:
  refreshInterval: {{ .Values.global.secrets.external.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.global.secrets.external.secretStoreRef | default "aws-secrets-manager" }}
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-frontend-secret
    creationPolicy: Owner
  # Pulls a JSON-encoded Secrets Manager value at <path>/frontend. Required keys:
  #   NEXTAUTH_SECRET, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
  dataFrom:
  - extract:
      key: {{ printf "%s/frontend" .Values.global.secrets.external.path | quote }}
{{- end }}
