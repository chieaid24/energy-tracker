apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-global-config
  namespace: {{ .Values.global.namespace }}
data:
  # MySQL connection — primary (writes).
  # If global.datasource.urlOverride is set (e.g. EKS overlay pointing at RDS) we use that;
  # otherwise we derive the URL from global.mysql.* — current Minikube/Compose behavior.
  SPRING_DATASOURCE_URL: {{ default (printf "jdbc:mysql://%s.%s.svc.cluster.local:%v/%s" .Values.global.mysql.host .Values.global.namespace .Values.global.mysql.port .Values.global.mysql.database) .Values.global.datasource.urlOverride | quote }}
  SPRING_DATASOURCE_USERNAME: {{ .Values.global.mysql.username }}

  # MySQL connection — read replica (reads). Apps fall back to primary creds when replica creds are blank.
  SPRING_DATASOURCE_REPLICA_URL: {{ default (printf "jdbc:mysql://%s.%s.svc.cluster.local:%v/%s" .Values.global.mysql.replicaHost .Values.global.namespace .Values.global.mysql.replicaPort .Values.global.mysql.database) .Values.global.datasource.replicaUrlOverride | quote }}

  # Kafka. Override via global.kafka.bootstrapOverride to point at MSK on EKS.
  SPRING_KAFKA_BOOTSTRAP_SERVERS: {{ default (printf "infra-kafka.%s.svc.cluster.local:9092" .Values.global.namespace) .Values.global.kafka.bootstrapOverride | quote }}
  {{- if .Values.global.kafka.iamAuth }}
  # MSK Serverless IAM authentication. Gated on global.kafka.iamAuth (EKS overlay flips this on).
  # Requires the aws-msk-iam-auth jar on the classpath of every Kafka client (ingestion, usage, alert).
  SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: "SASL_SSL"
  SPRING_KAFKA_PROPERTIES_SASL_MECHANISM: "AWS_MSK_IAM"
  SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG: "software.amazon.msk.auth.iam.IAMLoginModule required;"
  SPRING_KAFKA_PROPERTIES_SASL_CLIENT_CALLBACK_HANDLER_CLASS: "software.amazon.msk.auth.iam.IAMClientCallbackHandler"
  {{- end }}
  SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER: "org.springframework.kafka.support.serializer.JsonSerializer"
  SPRING_KAFKA_PRODUCER_KEY_SERIALIZER: "org.apache.kafka.common.serialization.StringSerializer"
  SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER: "org.springframework.kafka.support.serializer.JsonDeserializer"
  SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES: "*"

  # Mail (Mailpit)
  SPRING_MAIL_HOST: "infra-mailpit.{{ .Values.global.namespace }}.svc.cluster.local"
  SPRING_MAIL_PORT: "1025"

  # Redis
  SPRING_DATA_REDIS_HOST: "infra-redis.{{ .Values.global.namespace }}.svc.cluster.local"
  SPRING_DATA_REDIS_PORT: "6379"

  # InfluxDB
  INFLUX_URL: "http://infra-influxdb.{{ .Values.global.namespace }}.svc.cluster.local:8072"
  INFLUX_ORG: "chieaid24"
  INFLUX_BUCKET: "usage-bucket"

  # Ollama (Spring AI). Insight-service is the only consumer; harmless on services
  # that don't import Spring AI. Bedrock-equivalent options live on the insight-service
  # deployment when backend=bedrock.
  SPRING_AI_OLLAMA_BASE_URL: "http://infra-ollama.{{ .Values.global.namespace }}.svc.cluster.local:11434"
  SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL: "qwen2.5:0.5b"
  SPRING_AI_OLLAMA_CHAT_OPTIONS_NUM_PREDICT: "1024"

  # Observability — Metrics
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
  MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
  MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
  MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: "false"

  # Observability — Tracing (OTLP HTTP to Tempo)
  MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
  MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: "http://observability-tempo.{{ .Values.global.namespace }}.svc.cluster.local:4318/v1/traces"
  MANAGEMENT_OTLP_TRACING_ENDPOINT: "http://observability-tempo.{{ .Values.global.namespace }}.svc.cluster.local:4318/v1/traces"

  # Observability — Structured JSON logging (ECS format)
  LOGGING_STRUCTURED_FORMAT_CONSOLE: "ecs"

  # Observability — Kafka observation (for Kafka tracing)
  SPRING_KAFKA_TEMPLATE_OBSERVATION_ENABLED: "true"
  SPRING_KAFKA_LISTENER_OBSERVATION_ENABLED: "true"

  # Service URLs
  USER_SERVICE_URL: "http://{{ .Release.Name }}-user-service.{{ .Values.global.namespace }}.svc.cluster.local:8080/api/v1/user"
  DEVICE_SERVICE_URL: "http://{{ .Release.Name }}-device-service.{{ .Values.global.namespace }}.svc.cluster.local:8081/api/v1/device"
  INGESTION_ENDPOINT: "http://{{ .Release.Name }}-ingestion-service.{{ .Values.global.namespace }}.svc.cluster.local:8082/api/v1/ingestion"
  USAGE_SERVICE_URL: "http://{{ .Release.Name }}-usage-service.{{ .Values.global.namespace }}.svc.cluster.local:8083/api/v1/usage"
