global:
  namespace: default

# MySQL Configuration
# These values are passed to the mysql subchart
mysql:
  enabled: true
  image:
    repository: mysql
    tag: "8.3.0"
    pullPolicy: IfNotPresent

  auth:
    rootPassword: password
    database: energy_tracker
    replicationPassword: replicator-pass

  persistence:
    enabled: false
    size: 10Gi

  service:
    type: LoadBalancer
    port: 3307

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  replica:
    enabled: true
    service:
      type: ClusterIP
      port: 3306
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

kafka:
  enabled: true
  image:
    repository: apache/kafka
    tag: "latest"
    pullPolicy: IfNotPresent
  nodeId: 1
  clusterId: "energy-tracker-cluster-1"
  persistence:
    enabled: false
  service:
    type: ClusterIP
    port: 9092
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

influxdb:
  enabled: true
  image:
    repository: influxdb
    tag: "2.7"
    pullPolicy: IfNotPresent
  auth:
    username: iot-energy
    password: password
    org: chieaid24
    bucket: usage-bucket
    retention: 1w
    adminToken: my-token
  persistence:
    enabled: false
    size: 10Gi
  service:
    type: LoadBalancer
    port: 8072
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

mailpit:
  enabled: true
  image:
    repository: axllent/mailpit
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    smtpPort: 1025
    webPort: 8025
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

kafkaUi:
  enabled: true
  image:
    repository: ghcr.io/kafbat/kafka-ui
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 8070
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"

ollama:
  enabled: true
  image:
    repository: ollama/ollama
    tag: "latest"
    pullPolicy: IfNotPresent
  model: qwen2.5:0.5b
  port: 11434
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "6Gi"
      cpu: "2000m"

redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"