apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observability-grafana
  template:
    metadata:
      labels:
        app: observability-grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: iot-energy
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: password
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards
              mountPath: /etc/grafana/provisioning/dashboards
            - name: storage
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: datasources
          configMap:
            name: observability-grafana-datasources
        - name: dashboards
          configMap:
            name: observability-grafana-dashboards
        - name: storage
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: observability-grafana-data
          {{- else }}
          emptyDir: {}
          {{- end }}
