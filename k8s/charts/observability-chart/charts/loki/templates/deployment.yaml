apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observability-loki
  template:
    metadata:
      labels:
        app: observability-loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.2.0
          args:
            - "-config.file=/etc/loki/loki.yaml"
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: storage
              mountPath: /loki
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: observability-loki-config
        - name: storage
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: observability-loki-data
          {{- else }}
          emptyDir: {}
          {{- end }}
